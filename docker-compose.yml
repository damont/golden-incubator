services:
  api:
    build:
      context: .
      target: backend
    container_name: incubator-api
    ports:
      - "8030:8030"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MONGODB_URL=mongodb://host.docker.internal:27017
      - MONGODB_DB_NAME=golden_incubator
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    container_name: incubator-frontend
    ports:
      - "8096:80"
    depends_on:
      - api
    restart: unless-stopped
